<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flow</title>
</head>

<body style="margin:0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#f9fafb;">

  <div style="max-width:900px; margin:0 auto; padding:80px 20px; text-align:center;">

    <h1 style="font-size:48px; margin-bottom:20px;">
      Stay ahead of cash flow problems
    </h1>

    <p style="font-size:20px; color:#555; margin-bottom:30px;">
      Flow predicts cash shortfalls and helps you fix them before they hit.
    </p>

    <button style="
      padding:14px 28px;
      font-size:16px;
      background:#111;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    ">
      Get early access
    </button>

    <div style="
      margin-top:60px;
      background:white;
      border-radius:12px;
      padding:30px;
      width:380px;
      margin-left:auto;
      margin-right:auto;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
      text-align:left;
    ">

      <div style="font-size:14px; color:#999; margin-bottom:10px;">
        ⚠️ ALERT
      </div>

      <div style="font-size:22px; font-weight:600; margin-bottom:15px;">
        You’ll run out of cash in 18 days
      </div>

      <div style="color:#555; margin-bottom:20px;">
        Recommended action:<br>
        Chase 3 invoices (£8,200)
      </div>

      <button style="
        padding:10px 16px;
        border-radius:6px;
        border:none;
        background:#00c853;
        color:white;
        cursor:pointer;
      ">
        Send reminders
      </button>

    </div>

  </div>

</body>
</html>
