<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flow</title>
</head>

<body style="margin:0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#f9fafb;">

  <div style="max-width:900px; margin:0 auto; padding:80px 20px; text-align:center;">

    <h1 style="font-size:48px; margin-bottom:20px;">
      Stay ahead of cash flow problems
    </h1>

    <p style="font-size:20px; color:#555; margin-bottom:30px;">
      Flow predicts cash shortfalls and helps you fix them before they hit.
    </p>

    <button style="
      padding:14px 28px;
      font-size:16px;
      background:#111;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    ">
      Get early access
    </button>

    <!-- ALERT BOX -->
    <div style="
      margin-top:60px;
      background:white;
      border-radius:12px;
      padding:30px;
      width:380px;
      margin-left:auto;
      margin-right:auto;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
      text-align:left;
    ">

      <div style="font-size:14px; color:#999; margin-bottom:10px;">
        ⚠️ ALERT
      </div>

      <div style="font-size:22px; font-weight:600; margin-bottom:15px;">
        You’ll run out of cash in 18 days
      </div>

      <div style="color:#555; margin-bottom:20px;">
        Recommended action:<br>
        Chase 3 invoices (£8,200)
      </div>

      <button style="
        padding:10px 16px;
        border-radius:6px;
        border:none;
        background:#00c853;
        color:white;
        cursor:pointer;
      ">
        Send reminders
      </button>

    </div>

    <!-- NEW TOOL -->
    <div style="margin-top:80px; text-align:center;">

      <h2 style="margin-bottom:20px;">Check your cash flow</h2>

      <input id="cash" placeholder="Current cash (£)" style="margin:5px; padding:10px; width:200px;">
      <br>

      <input id="incoming" placeholder="Expected incoming (£)" style="margin:5px; padding:10px; width:200px;">
      <br>

      <input id="expenses" placeholder="Monthly expenses (£)" style="margin:5px; padding:10px; width:200px;">
      <br>

      <button onclick="calculate()" style="
        margin-top:15px;
        padding:12px 20px;
        background:#111;
        color:white;
        border:none;
        border-radius:6px;
        cursor:pointer;
      ">
        Check my cash flow
      </button>

      <p id="result" style="margin-top:20px; font-size:18px; font-weight:bold;"></p>

    </div>

  </div>

  <script>
  function calculate() {
    const cash = parseFloat(document.getElementById('cash').value) || 0;
    const incoming = parseFloat(document.getElementById('incoming').value) || 0;
    const expenses = parseFloat(document.getElementById('expenses').value) || 0;

    if (expenses === 0) {
      document.getElementById('result').innerText = "Please enter your expenses";
      return;
    }

    const total = cash + incoming;
    const days = (total / expenses) * 30;

    document.getElementById('result').innerText =
      "You will run out of cash in " + Math.round(days) + " days";
  }
  </script>

</body>
</html>
