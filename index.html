<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flow</title>
</head>

<body style="margin:0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#f9fafb;">

  <div style="max-width:900px; margin:0 auto; padding:80px 20px; text-align:center;">

    <h1 style="font-size:48px; margin-bottom:20px;">
      Stay ahead of cash flow problems
    </h1>

    <p style="font-size:20px; color:#555; margin-bottom:30px;">
      Flow predicts cash shortfalls and helps you fix them before they hit.
    </p>

    <button style="
      padding:14px 28px;
      font-size:16px;
      background:#111;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    ">
      Get early access
    </button>

    <div style="
      margin-top:60px;
      background:white;
      border-radius:12px;
      padding:30px;
      width:380px;
      margin-left:auto;
      margin-right:auto;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
      text-align:left;
    ">
      <div style="font-size:14px; color:#999; margin-bottom:10px;">
        ⚠️ ALERT
      </div>

      <div style="font-size:22px; font-weight:600; margin-bottom:15px;">
        You’ll run out of cash in 18 days
      </div>

      <div style="color:#555; margin-bottom:20px;">
        Recommended action:<br>
        Chase 3 invoices (£8,200)
      </div>

      <button style="
        padding:10px 16px;
        border-radius:6px;
        border:none;
        background:#00c853;
        color:white;
        cursor:pointer;
      ">
        Send reminders
      </button>
    </div>

    <div style="
      margin-top:80px;
      background:white;
      border-radius:12px;
      padding:35px;
      max-width:500px;
      margin-left:auto;
      margin-right:auto;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
      text-align:center;
    ">

      <h2 style="margin-bottom:20px;">Check your cash flow</h2>

      <input id="cash" type="number" placeholder="Current cash (£)" style="margin:8px 0; padding:12px; width:80%; border:1px solid #ddd; border-radius:8px;">
      <br>

      <input id="incoming" type="number" placeholder="Expected incoming this month (£)" style="margin:8px 0; padding:12px; width:80%; border:1px solid #ddd; border-radius:8px;">
      <br>

      <input id="expenses" type="number" placeholder="Monthly expenses (£)" style="margin:8px 0; padding:12px; width:80%; border:1px solid #ddd; border-radius:8px;">
      <br>

      <button onclick="calculate()" style="
        margin-top:15px;
        padding:12px 20px;
        background:#111;
        color:white;
        border:none;
        border-radius:8px;
        cursor:pointer;
        font-size:15px;
      ">
        Check my cash flow
      </button>

      <div id="resultBox" style="
        margin-top:25px;
        display:none;
        text-align:left;
        padding:20px;
        border-radius:10px;
        background:#f4f6f8;
      ">
        <p id="result" style="margin:0 0 10px 0; font-size:20px; font-weight:bold;"></p>
        <p id="status" style="margin:0 0 10px 0; font-weight:600;"></p>
        <p id="advice" style="margin:0; color:#555;"></p>
      </div>

    </div>

  </div>

  <script>
    function calculate() {
      const cash = parseFloat(document.getElementById('cash').value) || 0;
      const incoming = parseFloat(document.getElementById('incoming').value) || 0;
      const expenses = parseFloat(document.getElementById('expenses').value) || 0;

      const resultBox = document.getElementById('resultBox');
      const result = document.getElementById('result');
      const status = document.getElementById('status');
      const advice = document.getElementById('advice');

      if (expenses <= 0) {
        resultBox.style.display = 'block';
        resultBox.style.background = '#fff4e5';
        result.innerText = "Please enter your monthly expenses";
        status.innerText = "";
        advice.innerText = "";
        return;
      }

      const total = cash + incoming;
      const days = Math.round((total / expenses) * 30);

      resultBox.style.display = 'block';
      result.innerText = "You will run out of cash in " + days + " days";

      if (days <= 14) {
        resultBox.style.background = '#ffe5e5';
        status.innerText = "High risk";
        advice.innerText = "You may need to act now. Chase overdue invoices, delay non-essential spending, and review upcoming payments immediately.";
      } else if (days <= 30) {
        resultBox.style.background = '#fff4e5';
        status.innerText = "Warning";
        advice.innerText = "You should keep a close eye on cash. Consider chasing invoices and reducing flexible costs this month.";
      } else {
        resultBox.style.background = '#e8f7ee';
        status.innerText = "Healthy";
        advice.innerText = "Your current position looks okay for now. Keep monitoring invoices and stay ahead of future shortfalls.";
      }
    }
  </script>

</body>
</html>
